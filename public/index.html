<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WA Sender</title>

<style>
body { font-family:sans-serif;background:#0f172a;color:white;padding:20px }
.container { max-width:900px;margin:auto;background:#1e293b;padding:20px;border-radius:10px }
.row { display:flex;gap:10px;margin-bottom:10px }
input { flex:1;padding:10px }
button { padding:10px;margin:5px;cursor:pointer }
.progress { height:20px;background:#222;margin-top:10px }
.bar { height:100%;width:0%;background:lime }
.result { margin-top:10px;height:200px;overflow:auto;background:#111;padding:10px }
</style>
</head>

<body>

<div class="container">

<h3>🔑 Login WhatsApp</h3>
<input id="nomorLogin" placeholder="628xxx">
<button onclick="pair()">Ambil Pairing</button>
<div id="pairing"></div>

<hr>

<h2>WA Sender</h2>

<div id="form"></div>

<button onclick="addRow()">Tambah</button>
<button onclick="clearAll()">Clear</button>
<button onclick="send()">Kirim</button>

<div class="progress"><div id="bar" class="bar"></div></div>
<div id="result" class="result"></div>

</div>

<script>
let count=0

function addRow(){
    const d=document.createElement("div")
    d.className="row"
    d.id="row"+count

    d.innerHTML=`
        <input id="nomor${count}" placeholder="628xxx">
        <input id="sekolah${count}" placeholder="Sekolah">
        <button onclick="removeRow(${count})">X</button>
    `
    form.appendChild(d)
    count++
}

function removeRow(i){
    document.getElementById("row"+i)?.remove()
}

function clearAll(){
    form.innerHTML=""
    result.innerHTML=""
    bar.style.width="0%"
    count=0
    for(let i=0;i<3;i++) addRow()
}

for(let i=0;i<3;i++) addRow()

async function pair(){
    let nomor=nomorLogin.value

    let res=await fetch("/pairing",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nomor})
    })

    let data=await res.json()
    pairing.innerText=data.status?data.code:data.msg
}

async function send(){
    let nomorList=[], sekolahList=[]

    for(let i=0;i<count;i++){
        let n=document.getElementById("nomor"+i)
        let s=document.getElementById("sekolah"+i)

        if(n&&s&&n.value&&s.value){
            nomorList.push(n.value)
            sekolahList.push(s.value)
        }
    }

    await fetch("/kirim",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nomorList,sekolahList})
    })
}

const es=new EventSource("/stream")

es.onmessage=(e)=>{
    try{
        let d=JSON.parse(e.data)

        let percent=(d.index/d.total)*100
        bar.style.width=percent+"%"

        result.innerHTML+=`${d.index}. ${d.sekolah} → ${d.status}<br>`
        result.scrollTop=99999
    }catch{}
}
</script>

</body>
</html>
